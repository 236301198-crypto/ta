                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'spin-slow': 'spin 3s linear infinite',
                    },
                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' },
                        },
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },

    <!-- Advanced Custom CSS -->
    <style>
        :root {
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-bg: rgba(15, 20, 35, 0.7);
            --neon-glow: 0 0 15px rgba(59, 130, 246, 0.5);
        }

        body {
            background-color: theme('colors.dark');
            color: #F3F4F6;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        /* 2026 Premium Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: theme('colors.dark'); }
        ::-webkit-scrollbar-thumb { 
            background: theme('colors.surfaceLighter'); 
            border-radius: 20px; 
            border: 2px solid theme('colors.dark');
        }
        ::-webkit-scrollbar-thumb:hover { background: theme('colors.primary'); }

        /* Glassmorphism Utilities */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
        }
        .glass-card {
            background: linear-gradient(145deg, rgba(26, 34, 53, 0.8) 0%, rgba(15, 20, 35, 0.9) 100%);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        /* Hover Effects */
        .hover-trigger .hover-target { transition: all 0.3s ease; }
        .hover-trigger:hover .hover-target { opacity: 1; transform: translateY(0); }
        
        .card-lift { transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease; }
        .card-lift:hover {
            transform: translateY(-8px) scale(1.01);
            box-shadow: 0 20px 40px -10px rgba(139, 92, 246, 0.2);
            border-color: rgba(139, 92, 246, 0.4);
            z-index: 10;
        }

        /* Loaders & Skeletons */
        .skeleton {
            background: linear-gradient(90deg, theme('colors.surfaceLight') 25%, theme('colors.surfaceLighter') 50%, theme('colors.surfaceLight') 75%);
            background-size: 200% 100%;
            animation: skeleton-loading 1.5s infinite;
            border-radius: 0.5rem;
        }
        @keyframes skeleton-loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .spinner-ring {
            width: 40px; height: 40px;
            border-radius: 50%;
            border: 3px solid rgba(139, 92, 246, 0.2);
            border-top-color: theme('colors.accent');
            animation: spin 1s linear infinite;
        }

        /* Layout State Classes */
        .sidebar-open #sidebar { transform: translateX(0); }
        .sidebar-open #sidebar-overlay { opacity: 1; pointer-events: auto; }
        .hide { display: none !important; }
        
        /* Video Wrapper */
        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            overflow: hidden;
            border-radius: 1rem;
            background: #000;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }
        .video-container iframe {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0;
        }

        /* Range Slider Styling */
        input[type=range] {
            -webkit-appearance: none; background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%;
            background: theme('colors.primary'); cursor: pointer; margin-top: -6px;
            box-shadow: var(--neon-glow);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 4px; cursor: pointer;
            background: theme('colors.surfaceLighter'); border-radius: 2px;
        }

        /* Background Blobs for Visual Depth */
        .bg-blob {
            position: absolute; filter: blur(80px); z-index: -1; opacity: 0.4; border-radius: 50%;
        }
        .blob-1 { top: -10%; left: -10%; width: 40vw; height: 40vw; background: rgba(59, 130, 246, 0.3); animation-delay: 0s; }
        .blob-2 { bottom: -10%; right: -10%; width: 50vw; height: 50vw; background: rgba(139, 92, 246, 0.2); animation-delay: 2s; }
        .blob-3 { top: 40%; left: 30%; width: 30vw; height: 30vw; background: rgba(16, 185, 129, 0.15); animation-delay: 4s; }
    </style>

        // --- 3. DOM & UI UTILITIES ---

                    error: 'border-red-500/30 bg-red-500/10 text-red-400 shadow-[0_0_15px_rgba(239,68,68,0.2)]',

                const icon = type === 'success' ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>' :

                container.appendChild(el);

                catch(e) { return { batches: [], history: [], settings: {} }; }

            save: (data) => localStorage.setItem(CONFIG.LOCAL_DB_KEY, JSON.stringify(data)),
            
            addBatch: (courseObj) => {
                const data = db.get();
                if(!data.batches.find(b => b.courseId == courseObj.courseId)) {
                    data.batches.unshift(courseObj); // Add to top

                    return true;

                ui.toast('Already in My Batches', 'info');
                return false;

                ui.toast('Course removed from My Batches', 'success');

            getBatches: () => db.get().batches,
            
            logHistory: (courseId, courseName) => {
                const data = db.get();
                data.history = data.history.filter(h => h.id != courseId);
                data.history.unshift({id: courseId, name: courseName, time: Date.now()});
                if(data.history.length > 5) data.history.pop(); // Keep last 5
                db.save(data);
            }

        // --- 5. ROBUST API ENGINE ---
        async function fetchAPI(endpoint, dataObj, isLegacy = false) {
            
            // If already detected offline, return mock data instantly to keep UI fast
            if (state.isApiOffline) return serveMockData(endpoint);

            const target = `${CONFIG.API_BASE}${endpoint}`;
            const payload = JSON.stringify({ data: dataObj, token: decodeURIComponent(CONFIG.TOKEN) });
            
            let body, headers = {};
            if (!isLegacy) {
                body = new FormData(); body.append('body', payload);
            } else {
                body = new URLSearchParams(); body.append('body', payload);
                headers['Content-Type'] = 'application/x-www-form-urlencoded';
            }

            try {
                // Fetch with timeout
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 8000); // 8 sec timeout
                
                const res = await fetch(target, { method: 'POST', body, headers, signal: controller.signal });
                clearTimeout(timeoutId);
                
                if(!res.ok) throw new Error("HTTP Error " + res.status);
                
                const json = await res.json();
                ui.setApiStatus(false);
                return json;

            } catch (err) {
                console.warn(`API Error on ${endpoint}:`, err.message);
                
                // Switch to Offline Mode automatically
                ui.setApiStatus(true);
                ui.toast("Network Issue: Switched to Preview Mode", "warning");
                
                return serveMockData(endpoint);
            }
        }

        // Simulates API responses purely for UI preview when backend is not connected
        function serveMockData(endpoint) {
            return new Promise(resolve => {
                setTimeout(() => { // Simulate network delay
                    if (endpoint.includes('getCourseCategory')) {
                        resolve({ data: { courseCategory: MockData.categories }});
                    }
                    else if (endpoint.includes('getCoursesBySubCat')) {
                        resolve({ data: { candidateCourseList: MockData.courses }});
                    }
                    else if (endpoint.includes('getCourseCategories')) { // Syllabus
                        resolve({ data: { categoryList: MockData.syllabus }});
                    }
                    else if (endpoint.includes('getCourseVideos')) {
                        resolve({ data: { courseVideo: MockData.videos }});
                    }
                    else {
                        resolve({ data: {} });
                    }
                }, 600); // 600ms realistic delay
            });
        }

        // Helper to extract clean YouTube URLs/Thumbnails
        const videoUtils = {
            parseYT: (url) => {
                if (!url) return null;
                const match = url.match(/(?:youtu\.be\/|youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=))([^"&?\/\s]{11})/i);
                return match ? match[1] : null;
            },
            getThumb: (url) => {
                const id = videoUtils.parseYT(url);
                return id ? `https://img.youtube.com/vi/${id}/maxresdefault.jpg` : 'https://images.unsplash.com/photo-1611162617474-5b21e879e113?auto=format&fit=crop&q=80&w=640&h=360';
            },
            getEmbed: (url) => {
                const id = videoUtils.parseYT(url);
                return id ? `https://www.youtube.com/embed/${id}?autoplay=1&rel=0&modestbranding=1` : null;
            }

                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">${item.icon}</svg>
                        </div>
